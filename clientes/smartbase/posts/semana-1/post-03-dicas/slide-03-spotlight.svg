<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#07070E"/>
      <stop offset="100%" stop-color="#0F0F1C"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3E82F7"/>
      <stop offset="100%" stop-color="#6DAFF9"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1350" fill="url(#bg)"/>
  <rect x="0" y="0" width="1080" height="3" fill="url(#brand)"/>

  <!-- Logo pill -->
  <rect x="72" y="54" width="210" height="40" rx="20" fill="#0F0F1C"/>
  <circle cx="95" cy="74" r="10" fill="#3E82F7"/>
  <text x="168" y="80" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="19" text-anchor="middle" fill="#F2F2F6"><tspan font-weight="300">smart</tspan><tspan font-weight="700">base</tspan></text>
  <text x="1008" y="80" text-anchor="end" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="24" fill="#7A7A96">17.04.2026</text>
  <line x1="72" y1="110" x2="1008" y2="110" stroke="#1A1A2E" stroke-width="1"/>

  <!-- Number badge -->
  <circle cx="130" cy="232" r="56" fill="#0F0F1C" stroke="#3E82F7" stroke-width="2"/>
  <text x="130" y="250" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="54" font-weight="900"
        fill="#3E82F7" text-anchor="middle">2</text>

  <!-- Headline -->
  <text x="72" y="362" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="72" font-weight="800" fill="#F2F2F6">busca universal</text>
  <text x="72" y="450" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="72" font-weight="800" fill="#3E82F7">(spotlight)</text>
  <rect x="72" y="476" width="380" height="3" rx="2" fill="url(#brand)"/>

  <!-- Visual: Spotlight search bar -->
  <rect x="120" y="534" width="840" height="338" rx="24" fill="#0F0F1C"/>
  <!-- Search field -->
  <rect x="160" y="582" width="760" height="78" rx="16" fill="#1A1A2E"/>
  <text x="210" y="630" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="32" fill="#7A7A96">🔍 pesquisar</text>
  <!-- Results -->
  <rect x="160" y="678" width="760" height="58" rx="8" fill="#1A1A2E" opacity="0.8"/>
  <text x="200" y="716" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="26" fill="#C0C0D0">📱 configurações</text>
  <rect x="160" y="748" width="760" height="58" rx="8" fill="#1A1A2E" opacity="0.55"/>
  <text x="200" y="786" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="26" fill="#C0C0D0">🗓 agenda de hoje</text>
  <rect x="160" y="818" width="760" height="58" rx="8" fill="#1A1A2E" opacity="0.3"/>
  <text x="200" y="856" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="26" fill="#7A7A96">💰 calculadora: 234...</text>

  <!-- How to -->
  <text x="72" y="952" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="34" fill="#E0E0F0">arraste para baixo na tela inicial.</text>
  <text x="72" y="1000" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="34" fill="#E0E0F0">o spotlight abre sem precisar</text>
  <text x="72" y="1048" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="34" fill="#E0E0F0">entrar em nenhum app.</text>

  <text x="72" y="1126" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="34" fill="#7A7A96">encontra apps, contatos, arquivos,</text>
  <text x="72" y="1174" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="34" fill="#7A7A96">sites e até resolve contas.</text>
  <text x="72" y="1222" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="34" font-weight="600" fill="#3E82F7">o google do seu iphone — nativo.</text>

  <!-- Footer -->
  <line x1="72" y1="1272" x2="1008" y2="1272" stroke="#1A1A2E" stroke-width="1"/>
  <text x="72" y="1316" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="26" fill="#4A4A60">@smartbase.cxs</text>
  <text x="1008" y="1316" text-anchor="end" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="26" fill="#4A4A60">3 / 7</text>
</svg>
