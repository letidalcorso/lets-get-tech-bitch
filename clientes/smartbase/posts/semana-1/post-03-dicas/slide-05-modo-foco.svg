<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&amp;family=Inter:wght@300;400;500;600&amp;display=swap');</style>
  </defs>
  <rect width="1080" height="1350" fill="#07070E"/>
  <rect x="0" y="0" width="4" height="1350" fill="#3E82F7"/>

  <!-- Ghost number -->
  <text x="-30" y="960" font-family="'Bricolage Grotesque', sans-serif" font-size="700" font-weight="800" fill="#F2F2F6" opacity="0.03">4</text>

  <rect x="80" y="72" width="130" height="40" rx="20" fill="#0F0F1C" stroke="#6DAFF9" stroke-width="1"/>
  <text x="145" y="97" font-family="'Inter', sans-serif" font-size="15" font-weight="600" fill="#6DAFF9" text-anchor="middle" letter-spacing="2">DICAS</text>
  <text x="1000" y="97" font-family="'Inter', sans-serif" font-size="20" fill="#4A4A60" text-anchor="end">5 / 7</text>

  <!-- Number badge -->
  <circle cx="130" cy="232" r="54" fill="#3E82F7"/>
  <text x="130" y="250" font-family="'Bricolage Grotesque', sans-serif" font-size="52" font-weight="800" fill="#F2F2F6" text-anchor="middle">4</text>

  <text x="80" y="370" font-family="'Bricolage Grotesque', sans-serif" font-size="88" font-weight="800" fill="#F2F2F6">modo</text>
  <text x="80" y="468" font-family="'Bricolage Grotesque', sans-serif" font-size="88" font-weight="800" fill="#3E82F7">foco.</text>
  <line x1="80" y1="514" x2="1000" y2="514" stroke="#1A1A2E" stroke-width="1"/>

  <text x="80" y="560" font-family="'Inter', sans-serif" font-size="28" font-weight="300" fill="#7A7A96">silencia o que não importa agora.</text>

  <!-- 4 mode cards: 2x2 grid -->
  <rect x="80" y="596" width="444" height="180" rx="16" fill="#0F0F1C"/>
  <text x="120" y="656" font-family="'Inter', sans-serif" font-size="36" fill="#F2F2F6">🏢</text>
  <text x="120" y="700" font-family="'Inter', sans-serif" font-size="26" font-weight="600" fill="#F2F2F6">trabalho</text>
  <text x="120" y="732" font-family="'Inter', sans-serif" font-size="20" fill="#7A7A96">só apps e contatos essenciais</text>
  <text x="120" y="756" font-family="'Inter', sans-serif" font-size="20" fill="#4A4A60">sem distrações em reunião</text>

  <rect x="556" y="596" width="444" height="180" rx="16" fill="#0F0F1C"/>
  <text x="596" y="656" font-family="'Inter', sans-serif" font-size="36" fill="#F2F2F6">😴</text>
  <text x="596" y="700" font-family="'Inter', sans-serif" font-size="26" font-weight="600" fill="#F2F2F6">sono</text>
  <text x="596" y="732" font-family="'Inter', sans-serif" font-size="20" fill="#7A7A96">silencia tudo até o alarme</text>
  <text x="596" y="756" font-family="'Inter', sans-serif" font-size="20" fill="#4A4A60">nada passa — só o alarme</text>

  <rect x="80" y="794" width="444" height="180" rx="16" fill="#0F0F1C" stroke="#3E82F7" stroke-width="1"/>
  <text x="120" y="854" font-family="'Inter', sans-serif" font-size="36" fill="#F2F2F6">📚</text>
  <text x="120" y="898" font-family="'Inter', sans-serif" font-size="26" font-weight="600" fill="#3E82F7">estudos</text>
  <text x="120" y="930" font-family="'Inter', sans-serif" font-size="20" fill="#7A7A96">modo sem distração total</text>
  <text x="120" y="954" font-family="'Inter', sans-serif" font-size="20" fill="#4A4A60">ativa com 1 toque</text>

  <rect x="556" y="794" width="444" height="180" rx="16" fill="#0F0F1C"/>
  <text x="596" y="854" font-family="'Inter', sans-serif" font-size="36" fill="#F2F2F6">⚙️</text>
  <text x="596" y="898" font-family="'Inter', sans-serif" font-size="26" font-weight="600" fill="#F2F2F6">personalizado</text>
  <text x="596" y="930" font-family="'Inter', sans-serif" font-size="20" fill="#7A7A96">você define as regras</text>
  <text x="596" y="954" font-family="'Inter', sans-serif" font-size="20" fill="#4A4A60">horário automático ou manual</text>

  <!-- How to -->
  <text x="80" y="1050" font-family="'Inter', sans-serif" font-size="30" fill="#C0C0D0">configure em: <tspan font-weight="600" fill="#F2F2F6">ajustes → foco</tspan></text>
  <text x="80" y="1094" font-family="'Inter', sans-serif" font-size="30" fill="#7A7A96">ative por horário automático ou</text>
  <text x="80" y="1134" font-family="'Inter', sans-serif" font-size="30" fill="#7A7A96">pela central de controle na hora.</text>
  <text x="80" y="1194" font-family="'Inter', sans-serif" font-size="30" font-weight="600" fill="#3E82F7">você escolhe quem passa — e quem não passa.</text>

  <line x1="80" y1="1258" x2="1000" y2="1258" stroke="#1A1A2E" stroke-width="1"/>
  <rect x="80" y="1276" width="96" height="30" rx="15" fill="#0F0F1C"/>
  <text x="128" y="1297" font-family="'Inter', sans-serif" font-size="13" fill="#3E82F7" text-anchor="middle" font-weight="600">sb</text>
  <text x="194" y="1297" font-family="'Bricolage Grotesque', sans-serif" font-size="28" fill="#F2F2F6"><tspan font-weight="300">smart</tspan><tspan font-weight="700">base</tspan></text>
  <text x="1000" y="1297" font-family="'Inter', sans-serif" font-size="22" fill="#4A4A60" text-anchor="end">@smartbase.cxs</text>
</svg>
