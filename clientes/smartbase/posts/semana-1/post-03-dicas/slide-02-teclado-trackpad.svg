<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#07070E"/>
      <stop offset="100%" stop-color="#0F0F1C"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3E82F7"/>
      <stop offset="100%" stop-color="#6DAFF9"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1350" fill="url(#bg)"/>
  <rect x="0" y="0" width="1080" height="3" fill="url(#brand)"/>

  <!-- Logo pill -->
  <rect x="72" y="54" width="210" height="40" rx="20" fill="#0F0F1C"/>
  <circle cx="95" cy="74" r="10" fill="#3E82F7"/>
  <text x="168" y="80" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="19" text-anchor="middle" fill="#F2F2F6"><tspan font-weight="300">smart</tspan><tspan font-weight="700">base</tspan></text>
  <text x="1008" y="80" text-anchor="end" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="24" fill="#7A7A96">17.04.2026</text>
  <line x1="72" y1="110" x2="1008" y2="110" stroke="#1A1A2E" stroke-width="1"/>

  <!-- Number badge -->
  <circle cx="130" cy="232" r="56" fill="url(#brand)"/>
  <text x="130" y="250" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="54" font-weight="900"
        fill="#F2F2F6" text-anchor="middle">1</text>

  <!-- Headline -->
  <text x="72" y="362" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="72" font-weight="800" fill="#F2F2F6">teclado</text>
  <text x="72" y="450" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="72" font-weight="800" fill="#F2F2F6">vira trackpad</text>
  <rect x="72" y="476" width="440" height="3" rx="2" fill="url(#brand)"/>

  <!-- Visual representation -->
  <rect x="180" y="534" width="720" height="380" rx="24" fill="#0F0F1C" stroke="#1A1A2E" stroke-width="1"/>
  <!-- Keyboard rows (simplified visual) -->
  <rect x="220" y="582" width="640" height="58" rx="8" fill="#1A1A2E"/>
  <rect x="220" y="656" width="640" height="58" rx="8" fill="#1A1A2E"/>
  <rect x="220" y="730" width="640" height="58" rx="8" fill="#1A1A2E"/>
  <rect x="220" y="808" width="640" height="78" rx="8" fill="rgba(62,130,247,0.15)"/>
  <!-- Two finger indicator -->
  <circle cx="494" cy="724" r="28" fill="#3E82F7" opacity="0.85"/>
  <circle cx="574" cy="724" r="28" fill="#3E82F7" opacity="0.85"/>
  <!-- Dashed arrow -->
  <line x1="400" y1="762" x2="680" y2="762" stroke="#3E82F7" stroke-width="2.5" stroke-dasharray="10,5"/>
  <text x="540" y="846" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="24" fill="#3E82F7"
        text-anchor="middle" font-weight="600">→ cursor se move</text>

  <!-- Instructions -->
  <text x="72" y="976" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="34" fill="#C0C0D0">toque com dois dedos na barra</text>
  <text x="72" y="1024" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="34" fill="#C0C0D0">de espaço e arraste.</text>

  <text x="72" y="1098" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="34" fill="#7A7A96">o teclado vira um trackpad para</text>
  <text x="72" y="1146" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="34" fill="#7A7A96">posicionar o cursor com precisão.</text>
  <text x="72" y="1194" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="34" font-weight="600" fill="#3E82F7">funciona em qualquer app de texto.</text>

  <!-- Footer -->
  <line x1="72" y1="1272" x2="1008" y2="1272" stroke="#1A1A2E" stroke-width="1"/>
  <text x="72" y="1316" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="26" fill="#4A4A60">@smartbase.cxs</text>
  <text x="1008" y="1316" text-anchor="end" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="26" fill="#4A4A60">2 / 7</text>
</svg>
