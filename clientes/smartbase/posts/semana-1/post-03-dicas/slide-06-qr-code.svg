<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&amp;family=Inter:wght@300;400;500;600&amp;display=swap');</style>
  </defs>
  <rect width="1080" height="1350" fill="#07070E"/>
  <rect x="0" y="0" width="4" height="1350" fill="#3E82F7"/>

  <!-- Ghost number -->
  <text x="-30" y="960" font-family="'Bricolage Grotesque', sans-serif" font-size="700" font-weight="800" fill="#F2F2F6" opacity="0.03">5</text>

  <rect x="80" y="72" width="130" height="40" rx="20" fill="#0F0F1C" stroke="#6DAFF9" stroke-width="1"/>
  <text x="145" y="97" font-family="'Inter', sans-serif" font-size="15" font-weight="600" fill="#6DAFF9" text-anchor="middle" letter-spacing="2">DICAS</text>
  <text x="1000" y="97" font-family="'Inter', sans-serif" font-size="20" fill="#4A4A60" text-anchor="end">6 / 7</text>

  <!-- Number badge -->
  <circle cx="130" cy="232" r="54" fill="#3E82F7"/>
  <text x="130" y="250" font-family="'Bricolage Grotesque', sans-serif" font-size="52" font-weight="800" fill="#F2F2F6" text-anchor="middle">5</text>

  <text x="80" y="370" font-family="'Bricolage Grotesque', sans-serif" font-size="88" font-weight="800" fill="#F2F2F6">qr code</text>
  <text x="80" y="468" font-family="'Bricolage Grotesque', sans-serif" font-size="88" font-weight="800" fill="#3E82F7">pela câmera.</text>
  <line x1="80" y1="514" x2="1000" y2="514" stroke="#1A1A2E" stroke-width="1"/>

  <!-- QR Code visual centered -->
  <rect x="300" y="554" width="480" height="480" rx="24" fill="#0F0F1C"/>

  <!-- QR code pattern (stylized) -->
  <!-- Top-left finder -->
  <rect x="340" y="594" width="110" height="110" rx="10" fill="#F2F2F6"/>
  <rect x="358" y="612" width="74" height="74" rx="6" fill="#0F0F1C"/>
  <rect x="372" y="626" width="46" height="46" rx="3" fill="#F2F2F6"/>

  <!-- Top-right finder -->
  <rect x="630" y="594" width="110" height="110" rx="10" fill="#F2F2F6"/>
  <rect x="648" y="612" width="74" height="74" rx="6" fill="#0F0F1C"/>
  <rect x="662" y="626" width="46" height="46" rx="3" fill="#F2F2F6"/>

  <!-- Bottom-left finder -->
  <rect x="340" y="834" width="110" height="110" rx="10" fill="#F2F2F6"/>
  <rect x="358" y="852" width="74" height="74" rx="6" fill="#0F0F1C"/>
  <rect x="372" y="866" width="46" height="46" rx="3" fill="#F2F2F6"/>

  <!-- Middle dots pattern -->
  <rect x="474" y="594" width="18" height="18" rx="3" fill="#F2F2F6"/>
  <rect x="502" y="614" width="18" height="18" rx="3" fill="#F2F2F6"/>
  <rect x="530" y="594" width="18" height="18" rx="3" fill="#F2F2F6"/>
  <rect x="558" y="614" width="18" height="18" rx="3" fill="#F2F2F6"/>
