<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#07070E"/>
      <stop offset="100%" stop-color="#0F0F1C"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3E82F7"/>
      <stop offset="100%" stop-color="#6DAFF9"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1350" fill="url(#bg)"/>
  <rect x="0" y="0" width="1080" height="3" fill="url(#brand)"/>

  <!-- Logo pill -->
  <rect x="72" y="54" width="210" height="40" rx="20" fill="#0F0F1C"/>
  <circle cx="95" cy="74" r="10" fill="#3E82F7"/>
  <text x="168" y="80" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="19" text-anchor="middle" fill="#F2F2F6"><tspan font-weight="300">smart</tspan><tspan font-weight="700">base</tspan></text>
  <text x="1008" y="80" text-anchor="end" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="24" fill="#7A7A96">17.04.2026</text>
  <line x1="72" y1="110" x2="1008" y2="110" stroke="#1A1A2E" stroke-width="1"/>

  <!-- Number badge -->
  <circle cx="130" cy="232" r="56" fill="url(#brand)"/>
  <text x="130" y="250" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="54" font-weight="900"
        fill="#F2F2F6" text-anchor="middle">5</text>

  <!-- Headline -->
  <text x="72" y="368" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="72" font-weight="800" fill="#F2F2F6">qr code</text>
  <text x="72" y="456" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="72" font-weight="800" fill="#F2F2F6">pela câmera</text>
  <text x="72" y="544" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="72" font-weight="800" fill="#F2F2F6">nativa</text>
  <rect x="72" y="570" width="340" height="3" rx="2" fill="url(#brand)"/>

  <!-- QR visual -->
  <rect x="340" y="626" width="400" height="400" rx="20" fill="#0F0F1C" stroke="#1A1A2E" stroke-width="2"/>
  <!-- QR code pattern -->
  <rect x="370" y="656" width="100" height="100" rx="8" fill="#F2F2F6"/>
  <rect x="390" y="676" width="60" height="60" rx="4" fill="#0F0F1C"/>
  <rect x="610" y="656" width="100" height="100" rx="8" fill="#F2F2F6"/>
  <rect x="630" y="676" width="60" height="60" rx="4" fill="#0F0F1C"/>
  <rect x="370" y="866" width="100" height="100" rx="8" fill="#F2F2F6"/>
  <rect x="390" y="886" width="60" height="60" rx="4" fill="#0F0F1C"/>
  <!-- Middle dots -->
  <rect x="490" y="676" width="18" height="18" rx="3" fill="#F2F2F6"/>
  <rect x="518" y="696" width="18" height="18" rx="3" fill="#F2F2F6"/>
  <rect x="548" y="676" width="18" height="18" rx="3" fill="#F2F2F6"/>
  <rect x="490" y="756" width="18" height="18" rx="3" fill="#F2F2F6"/>
  <rect x="528" y="786" width="18" height="18" rx="3" fill="#F2F2F6"/>
  <rect x="490" y="836" width="18" height="18" rx="3" fill="#F2F2F6"/>
  <rect x="558" y="846" width="18" height="18" rx="3" fill="#F2F2F6"/>
  <!-- Scan corners -->
  <path d="M 356 626 L 320 626 L 320 666" stroke="#3E82F7" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M 724 626 L 760 626 L 760 666" stroke="#3E82F7" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M 356 1026 L 320 1026 L 320 986" stroke="#3E82F7" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M 724 1026 L 760 1026 L 760 986" stroke="#3E82F7" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- Instructions -->
  <text x="72" y="1100" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="34" fill="#C0C0D0">aponte a câmera — sem app extra.</text>
  <text x="72" y="1148" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="34" fill="#C0C0D0">o link aparece automaticamente</text>
  <text x="72" y="1196" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="34" fill="#C0C0D0">no topo da tela.</text>

  <text x="72" y="1264" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="32" fill="#7A7A96">funciona com links, wi-fi, pix,</text>
  <text x="72" y="1308" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="32" font-weight="600" fill="#3E82F7">cardápios e muito mais.</text>

  <!-- Footer -->
  <text x="1008" y="1336" text-anchor="end" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="26" fill="#4A4A60">6 / 7</text>
</svg>
