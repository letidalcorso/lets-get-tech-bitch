  <rect x="530" y="680" width="18" height="18" rx="3" fill="#F2F2F6"/>
  <rect x="474" y="726" width="18" height="18" rx="3" fill="#F2F2F6"/>
  <rect x="510" y="744" width="18" height="18" rx="3" fill="#F2F2F6"/>
  <rect x="546" y="726" width="18" height="18" rx="3" fill="#F2F2F6"/>
  <rect x="582" y="760" width="18" height="18" rx="3" fill="#F2F2F6"/>
  <rect x="618" y="726" width="18" height="18" rx="3" fill="#F2F2F6"/>
  <rect x="474" y="800" width="18" height="18" rx="3" fill="#F2F2F6"/>
  <rect x="520" y="820" width="18" height="18" rx="3" fill="#F2F2F6"/>
  <rect x="560" y="800" width="18" height="18" rx="3" fill="#F2F2F6"/>
  <rect x="608" y="820" width="18" height="18" rx="3" fill="#F2F2F6"/>
  <rect x="630" y="740" width="18" height="18" rx="3" fill="#F2F2F6"/>
  <rect x="660" y="760" width="18" height="18" rx="3" fill="#F2F2F6"/>
  <rect x="650" y="800" width="18" height="18" rx="3" fill="#F2F2F6"/>
  <rect x="680" y="820" width="18" height="18" rx="3" fill="#F2F2F6"/>

  <!-- Scan corner overlays -->
  <path d="M 290 544 L 248 544 L 248 592" stroke="#3E82F7" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M 790 544 L 832 544 L 832 592" stroke="#3E82F7" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M 290 1044 L 248 1044 L 248 996" stroke="#3E82F7" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M 790 1044 L 832 1044 L 832 996" stroke="#3E82F7" stroke-width="4" fill="none" stroke-linecap="round"/>

  <text x="80" y="1104" font-family="'Inter', sans-serif" font-size="30" fill="#C0C0D0">aponte a câmera — sem app extra.</text>
  <text x="80" y="1144" font-family="'Inter', sans-serif" font-size="30" fill="#C0C0D0">o link aparece automaticamente</text>
  <text x="80" y="1184" font-family="'Inter', sans-serif" font-size="30" fill="#C0C0D0">no topo da tela.</text>

  <text x="80" y="1232" font-family="'Inter', sans-serif" font-size="30" fill="#7A7A96">funciona com links, wi-fi, pix, cardápios</text>
  <text x="80" y="1210" font-family="'Inter', sans-serif" font-size="30" font-weight="600" fill="#3E82F7">e muito mais — sem instalar nada.</text>

  <line x1="80" y1="1258" x2="1000" y2="1258" stroke="#1A1A2E" stroke-width="1"/>
  <rect x="80" y="1276" width="96" height="30" rx="15" fill="#0F0F1C"/>
  <text x="128" y="1297" font-family="'Inter', sans-serif" font-size="13" fill="#3E82F7" text-anchor="middle" font-weight="600">sb</text>
  <text x="194" y="1297" font-family="'Bricolage Grotesque', sans-serif" font-size="28" fill="#F2F2F6"><tspan font-weight="300">smart</tspan><tspan font-weight="700">base</tspan></text>
  <text x="1000" y="1297" font-family="'Inter', sans-serif" font-size="22" fill="#4A4A60" text-anchor="end">@smartbase.cxs</text>
