<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#07070E"/>
      <stop offset="100%" stop-color="#0F0F1C"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3E82F7"/>
      <stop offset="100%" stop-color="#6DAFF9"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1350" fill="url(#bg)"/>
  <rect x="0" y="0" width="1080" height="3" fill="url(#brand)"/>

  <!-- Logo pill -->
  <rect x="72" y="54" width="210" height="40" rx="20" fill="#0F0F1C"/>
  <circle cx="95" cy="74" r="10" fill="#3E82F7"/>
  <text x="168" y="80" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="19" text-anchor="middle" fill="#F2F2F6"><tspan font-weight="300">smart</tspan><tspan font-weight="700">base</tspan></text>
  <text x="1008" y="80" text-anchor="end" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="24" fill="#7A7A96">16.04.2026</text>
  <line x1="72" y1="110" x2="1008" y2="110" stroke="#1A1A2E" stroke-width="1"/>

  <!-- Headline -->
  <text x="72" y="238" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="72" font-weight="800" fill="#F2F2F6">o que afeta</text>
  <text x="72" y="326" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="72" font-weight="800" fill="#F2F2F6">o valor do</text>
  <text x="72" y="414" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="72" font-weight="800" fill="#F2F2F6">seu iphone</text>
  <rect x="72" y="440" width="350" height="3" rx="2" fill="url(#brand)"/>

  <!-- Supporting text -->
  <text x="72" y="514" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="32" fill="#7A7A96">4 critérios que nossa equipe avalia</text>
  <text x="72" y="556" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="32" fill="#7A7A96">em todo aparelho recebido em trade-in.</text>

  <!-- Criteria cards -->
  <rect x="72" y="614" width="440" height="256" rx="20" fill="#0F0F1C"/>
  <text x="130" y="692" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="48">📱</text>
  <text x="130" y="762" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="38" font-weight="700" fill="#F2F2F6">tela</text>
  <text x="130" y="810" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="26" fill="#7A7A96">trincas, manchas</text>
  <text x="130" y="848" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="26" fill="#7A7A96">e pixels mortos</text>

  <rect x="568" y="614" width="440" height="256" rx="20" fill="#0F0F1C"/>
  <text x="626" y="692" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="48">🔋</text>
  <text x="626" y="762" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="38" font-weight="700" fill="#F2F2F6">bateria</text>
  <text x="626" y="810" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="26" fill="#7A7A96">% de saúde</text>
  <text x="626" y="848" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="26" fill="#7A7A96">da bateria</text>

  <rect x="72" y="888" width="440" height="256" rx="20" fill="#0F0F1C"/>
  <text x="130" y="966" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="48">📷</text>
  <text x="130" y="1036" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="38" font-weight="700" fill="#F2F2F6">câmera</text>
  <text x="130" y="1084" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="26" fill="#7A7A96">lentes, foco</text>
  <text x="130" y="1122" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="26" fill="#7A7A96">e gravação</text>

  <rect x="568" y="888" width="440" height="256" rx="20" fill="#0F0F1C"/>
  <text x="626" y="966" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="48">🔲</text>
  <text x="626" y="1036" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="38" font-weight="700" fill="#F2F2F6">carcaça</text>
  <text x="626" y="1084" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="26" fill="#7A7A96">amassados</text>
  <text x="626" y="1122" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="26" fill="#7A7A96">e arranhões</text>

  <!-- Note -->
  <text x="540" y="1216" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="28" fill="#4A4A60" text-anchor="middle">aparelho original apple = valor mais alto garantido</text>

  <!-- Footer -->
  <text x="72" y="1312" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="26" fill="#4A4A60">@smartbase.cxs</text>
  <text x="1008" y="1312" text-anchor="end" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="26" fill="#4A4A60">3 / 6</text>
