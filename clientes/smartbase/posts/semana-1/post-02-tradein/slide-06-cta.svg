<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&amp;family=Inter:wght@300;400;500;600&amp;display=swap');</style>
  </defs>
  <rect width="1080" height="1350" fill="#0A1628"/>
  <rect x="0" y="0" width="4" height="1350" fill="#3E82F7"/>

  <text x="-40" y="1050" font-family="'Bricolage Grotesque', sans-serif" font-size="600" font-weight="800" fill="#F2F2F6" opacity="0.025">dm</text>

  <rect x="80" y="72" width="160" height="40" rx="20" fill="rgba(15,15,28,0.6)" stroke="rgba(62,130,247,0.4)" stroke-width="1"/>
  <text x="160" y="97" font-family="'Inter', sans-serif" font-size="15" font-weight="600" fill="#6DAFF9" text-anchor="middle" letter-spacing="2">TRADE-IN</text>
  <text x="1000" y="97" font-family="'Inter', sans-serif" font-size="20" fill="rgba(242,242,246,0.25)" text-anchor="end">6 / 6</text>

  <text x="80" y="330" font-family="'Bricolage Grotesque', sans-serif" font-size="100" font-weight="800" fill="#F2F2F6">quer saber</text>
  <text x="80" y="440" font-family="'Bricolage Grotesque', sans-serif" font-size="100" font-weight="800" fill="#F2F2F6">quanto vale</text>
  <text x="80" y="550" font-family="'Bricolage Grotesque', sans-serif" font-size="100" font-weight="800" fill="#3E82F7">o seu?</text>

  <line x1="80" y1="600" x2="1000" y2="600" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <text x="80" y="660" font-family="'Bricolage Grotesque', sans-serif" font-size="32" font-weight="700" fill="#F2F2F6">como fazer a simulação gratuita</text>

  <rect x="80" y="700" width="920" height="330" rx="20" fill="rgba(62,130,247,0.1)" stroke="rgba(62,130,247,0.2)" stroke-width="1"/>

  <rect x="80" y="700" width="50" height="96" rx="8" fill="rgba(62,130,247,0.3)"/>
  <text x="105" y="757" font-family="'Bricolage Grotesque', sans-serif" font-size="28" font-weight="700" fill="#F2F2F6" text-anchor="middle">1</text>
  <text x="152" y="757" font-family="'Inter', sans-serif" font-size="28" fill="#F2F2F6">manda dm com o modelo</text>
  <line x1="130" y1="796" x2="980" y2="796" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <rect x="80" y="796" width="50" height="96" rx="8" fill="rgba(62,130,247,0.3)"/>
  <text x="105" y="853" font-family="'Bricolage Grotesque', sans-serif" font-size="28" font-weight="700" fill="#F2F2F6" text-anchor="middle">2</text>
  <text x="152" y="853" font-family="'Inter', sans-serif" font-size="28" fill="#F2F2F6">informa o estado: bom / razoável</text>
  <line x1="130" y1="892" x2="980" y2="892" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <rect x="80" y="892" width="50" height="138" rx="8" fill="rgba(62,130,247,0.3)"/>
  <text x="105" y="971" font-family="'Bricolage Grotesque', sans-serif" font-size="28" font-weight="700" fill="#F2F2F6" text-anchor="middle">3</text>
  <text x="152" y="953" font-family="'Inter', sans-serif" font-size="28" fill="#F2F2F6">a gente responde em até 2h</text>
  <text x="152" y="993" font-family="'Inter', sans-serif" font-size="22" fill="#7A7A96">sem visita obrigatória à loja</text>

  <rect x="80" y="1100" width="920" height="80" rx="40" fill="#3E82F7"/>
  <text x="540" y="1150" font-family="'Bricolage Grotesque', sans-serif" font-size="34" font-weight="800" fill="#F2F2F6" text-anchor="middle">→ manda dm agora</text>

  <text x="540" y="1230" font-family="'Inter', sans-serif" font-size="24" fill="rgba(242,242,246,0.35)" text-anchor="middle">qual modelo você tem? comenta aqui.</text>

  <line x1="80" y1="1258" x2="1000" y2="1258" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <rect x="80" y="1276" width="96" height="30" rx="15" fill="rgba(15,15,28,0.6)"/>
  <text x="128" y="1297" font-family="'Inter', sans-serif" font-size="13" fill="#3E82F7" text-anchor="middle" font-weight="600">sb</text>
  <text x="194" y="1297" font-family="'Bricolage Grotesque', sans-serif" font-size="28" fill="#F2F2F6"><tspan font-weight="300">smart</tspan><tspan font-weight="700">base</tspan></text>
  <text x="1000" y="1297" font-family="'Inter', sans-serif" font-size="22" fill="rgba(242,242,246,0.2)" text-anchor="end">@smartbase.cxs</text>
</svg>
