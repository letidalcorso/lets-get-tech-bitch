<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A1628"/>
      <stop offset="100%" stop-color="#0D1E3A"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3E82F7"/>
      <stop offset="100%" stop-color="#6DAFF9"/>
    </linearGradient>
    <linearGradient id="glassbg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(62,130,247,0.14)"/>
      <stop offset="100%" stop-color="rgba(109,175,249,0.06)"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1350" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="900" cy="200" r="300" fill="rgba(62,130,247,0.05)"/>
  <circle cx="180" cy="1150" r="250" fill="rgba(62,130,247,0.05)"/>

  <!-- Logo pill -->
  <rect x="72" y="54" width="210" height="40" rx="20" fill="rgba(15,15,28,0.6)"/>
  <circle cx="95" cy="74" r="10" fill="#3E82F7"/>
  <text x="168" y="80" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="19" text-anchor="middle" fill="#F2F2F6"><tspan font-weight="300">smart</tspan><tspan font-weight="700">base</tspan></text>
  <text x="1008" y="80" text-anchor="end" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="24" fill="rgba(242,242,246,0.4)">16.04.2026</text>
  <line x1="72" y1="110" x2="1008" y2="110" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

  <!-- Main question -->
  <text x="540" y="344" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="80" font-weight="800" fill="#F2F2F6" text-anchor="middle">quer saber</text>
  <text x="540" y="440" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="80" font-weight="800" fill="#F2F2F6" text-anchor="middle">quanto vale</text>
  <text x="540" y="536" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="80" font-weight="800" fill="#F2F2F6" text-anchor="middle">o seu?</text>

  <!-- Instruction card -->
  <rect x="72" y="616" width="936" height="360" rx="24" fill="url(#glassbg)" stroke="rgba(62,130,247,0.2)" stroke-width="1"/>

  <text x="540" y="688" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="34" font-weight="700"
        fill="#F2F2F6" text-anchor="middle">como fazer a simulação gratuita</text>
  <line x1="200" y1="712" x2="880" y2="712" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

  <circle cx="128" cy="772" r="26" fill="rgba(62,130,247,0.25)"/>
  <text x="128" y="781" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="26" font-weight="700"
        fill="#F2F2F6" text-anchor="middle">1</text>
  <text x="182" y="785" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="30" fill="#F2F2F6">manda dm com o modelo</text>

  <circle cx="128" cy="848" r="26" fill="rgba(62,130,247,0.25)"/>
  <text x="128" y="857" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="26" font-weight="700"
        fill="#F2F2F6" text-anchor="middle">2</text>
  <text x="182" y="861" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="30" fill="#F2F2F6">informa o estado: bom / razoável</text>

  <circle cx="128" cy="924" r="26" fill="rgba(62,130,247,0.25)"/>
  <text x="128" y="933" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="26" font-weight="700"
        fill="#F2F2F6" text-anchor="middle">3</text>
  <text x="182" y="937" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="30" fill="#F2F2F6">a gente responde em até 2h</text>

  <!-- Badge -->
  <rect x="200" y="1004" width="680" height="58" rx="29" fill="rgba(62,130,247,0.15)"/>
  <text x="540" y="1040" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="26" font-weight="600"
        fill="#F2F2F6" text-anchor="middle">sem visita obrigatória à loja</text>

  <!-- Big CTA -->
  <rect x="72" y="1098" width="936" height="96" rx="48" fill="url(#brand)"/>
  <text x="540" y="1156" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="36" font-weight="800" fill="#F2F2F6" text-anchor="middle">→ manda dm agora</text>

  <!-- Footer -->
  <text x="540" y="1288" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="26"
        fill="rgba(242,242,246,0.4)" text-anchor="middle">qual modelo você tem? comenta aqui.</text>
  <text x="72" y="1328" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="26" fill="rgba(242,242,246,0.25)">@smartbase.cxs</text>
  <text x="1008" y="1328" text-anchor="end" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="26" fill="rgba(242,242,246,0.25)">6 / 6</text>
</svg>
