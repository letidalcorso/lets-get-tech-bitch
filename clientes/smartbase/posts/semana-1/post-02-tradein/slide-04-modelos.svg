<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&amp;family=Inter:wght@300;400;500;600&amp;display=swap');</style>
  </defs>
  <rect width="1080" height="1350" fill="#07070E"/>
  <rect x="0" y="0" width="4" height="1350" fill="#3E82F7"/>

  <rect x="80" y="72" width="160" height="40" rx="20" fill="#0F0F1C" stroke="#3E82F7" stroke-width="1"/>
  <text x="160" y="97" font-family="'Inter', sans-serif" font-size="15" font-weight="600" fill="#3E82F7" text-anchor="middle" letter-spacing="2">TRADE-IN</text>
  <text x="1000" y="97" font-family="'Inter', sans-serif" font-size="20" fill="#4A4A60" text-anchor="end">4 / 6</text>

  <text x="80" y="240" font-family="'Bricolage Grotesque', sans-serif" font-size="88" font-weight="800" fill="#F2F2F6">aceitamos</text>
  <text x="80" y="340" font-family="'Bricolage Grotesque', sans-serif" font-size="88" font-weight="800" fill="#3E82F7">esses modelos.</text>
  <line x1="80" y1="386" x2="1000" y2="386" stroke="#1A1A2E" stroke-width="1"/>
  <text x="80" y="430" font-family="'Inter', sans-serif" font-size="26" fill="#7A7A96">em bom ou razoável estado de conservação.</text>

  <rect x="80" y="476" width="920" height="64" rx="12" fill="#0F0F1C"/>
  <text x="120" y="517" font-family="'Inter', sans-serif" font-size="22" font-weight="600" fill="#3E82F7">iphone</text>
  <text x="240" y="517" font-family="'Inter', sans-serif" font-size="22" fill="#C0C0D0">13 · 14 · 15 · 16 · 17 (todos os modelos)</text>

  <rect x="80" y="556" width="920" height="64" rx="12" fill="#0F0F1C"/>
  <text x="120" y="597" font-family="'Inter', sans-serif" font-size="22" font-weight="600" fill="#3E82F7">macbook</text>
  <text x="264" y="597" font-family="'Inter', sans-serif" font-size="22" fill="#C0C0D0">air · pro — intel e apple silicon (m1 ao m4)</text>

  <rect x="80" y="636" width="920" height="64" rx="12" fill="#0F0F1C"/>
  <text x="120" y="677" font-family="'Inter', sans-serif" font-size="22" font-weight="600" fill="#3E82F7">ipad</text>
  <text x="192" y="677" font-family="'Inter', sans-serif" font-size="22" fill="#C0C0D0">air · pro · mini · 9ª gen em diante</text>

  <rect x="80" y="716" width="920" height="64" rx="12" fill="#0F0F1C"/>
  <text x="120" y="757" font-family="'Inter', sans-serif" font-size="22" font-weight="600" fill="#3E82F7">apple watch</text>
  <text x="320" y="757" font-family="'Inter', sans-serif" font-size="22" fill="#C0C0D0">series 6 em diante</text>

  <!-- Not accepted -->
  <rect x="80" y="830" width="920" height="160" rx="16" fill="#1A0810" stroke="#2A1020" stroke-width="1"/>
  <text x="120" y="878" font-family="'Inter', sans-serif" font-size="22" font-weight="600" fill="#FF453A">✕ não aceitamos</text>
  <text x="120" y="916" font-family="'Inter', sans-serif" font-size="22" fill="#C0C0D0">icloud ativo do proprietário anterior</text>
  <text x="120" y="952" font-family="'Inter', sans-serif" font-size="22" fill="#C0C0D0">telas completamente quebradas ou inoperantes</text>

  <!-- Accepted reduced -->
  <rect x="80" y="1006" width="920" height="130" rx="16" fill="#071420" stroke="#0F2A40" stroke-width="1"/>
  <text x="120" y="1048" font-family="'Inter', sans-serif" font-size="22" font-weight="600" fill="#3E82F7">✓ aceitamos com valor reduzido</text>
  <text x="120" y="1086" font-family="'Inter', sans-serif" font-size="22" fill="#C0C0D0">trincas leves · bateria entre 80–85% · arranhões</text>

  <line x1="80" y1="1258" x2="1000" y2="1258" stroke="#1A1A2E" stroke-width="1"/>
  <rect x="80" y="1276" width="96" height="30" rx="15" fill="#0F0F1C"/>
  <text x="128" y="1297" font-family="'Inter', sans-serif" font-size="13" fill="#3E82F7" text-anchor="middle" font-weight="600">sb</text>
  <text x="194" y="1297" font-family="'Bricolage Grotesque', sans-serif" font-size="28" fill="#F2F2F6"><tspan font-weight="300">smart</tspan><tspan font-weight="700">base</tspan></text>
  <text x="1000" y="1297" font-family="'Inter', sans-serif" font-size="22" fill="#4A4A60" text-anchor="end">@smartbase.cxs</text>
