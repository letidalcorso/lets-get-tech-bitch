<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#07070E"/>
      <stop offset="100%" stop-color="#0F0F1C"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3E82F7"/>
      <stop offset="100%" stop-color="#6DAFF9"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1350" fill="url(#bg)"/>
  <rect x="0" y="0" width="1080" height="3" fill="url(#brand)"/>

  <!-- Logo pill -->
  <rect x="72" y="54" width="210" height="40" rx="20" fill="#0F0F1C"/>
  <circle cx="95" cy="74" r="10" fill="#3E82F7"/>
  <text x="168" y="80" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="19" text-anchor="middle" fill="#F2F2F6"><tspan font-weight="300">smart</tspan><tspan font-weight="700">base</tspan></text>
  <text x="1008" y="80" text-anchor="end" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="24" fill="#7A7A96">16.04.2026</text>
  <line x1="72" y1="110" x2="1008" y2="110" stroke="#1A1A2E" stroke-width="1"/>

  <!-- Tag -->
  <rect x="72" y="148" width="218" height="46" rx="23" fill="#0F0F1C" stroke="#3E82F7" stroke-width="1.5"/>
  <text x="181" y="178" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="22" font-weight="600"
        fill="#3E82F7" text-anchor="middle">trade-in</text>

  <!-- Big question mark -->
  <text x="540" y="570" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="340" font-weight="800" fill="#0F0F1C" text-anchor="middle">?</text>
  <text x="540" y="570" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="340" font-weight="800" fill="#3E82F7" text-anchor="middle" opacity="0.10">?</text>

  <!-- Main headline -->
  <text x="72" y="756" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="76" font-weight="800" fill="#F2F2F6">quanto vale</text>
  <text x="72" y="848" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="76" font-weight="800" fill="#3E82F7">seu iphone</text>
  <text x="72" y="940" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="76" font-weight="800" fill="#F2F2F6">agora?</text>

  <rect x="72" y="968" width="300" height="3" fill="url(#brand)" rx="2"/>

  <!-- Supporting text -->
  <text x="72" y="1036" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="34" fill="#C0C0D0">simulação real de trade-in.</text>
  <text x="72" y="1084" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="34" fill="#C0C0D0">sem surpresa. sem enrolação.</text>

  <!-- Swipe hint -->
  <text x="540" y="1200" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="28" fill="#4A4A60" text-anchor="middle">arrasta →</text>

  <!-- Footer -->
  <line x1="72" y1="1252" x2="1008" y2="1252" stroke="#1A1A2E" stroke-width="1"/>
  <text x="72" y="1310" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="26" fill="#4A4A60">@smartbase.cxs</text>
  <text x="1008" y="1310" text-anchor="end" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="26" fill="#4A4A60">1 / 6</text>
</svg>
