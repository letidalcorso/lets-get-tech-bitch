<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&amp;family=Inter:wght@300;400;500;600&amp;display=swap');</style>
  </defs>
  <rect width="1080" height="1350" fill="#07070E"/>
  <rect x="0" y="0" width="4" height="1350" fill="#3E82F7"/>

  <rect x="80" y="72" width="160" height="40" rx="20" fill="#0F0F1C" stroke="#3E82F7" stroke-width="1"/>
  <text x="160" y="97" font-family="'Inter', sans-serif" font-size="15" font-weight="600" fill="#3E82F7" text-anchor="middle" letter-spacing="2">TRADE-IN</text>
  <text x="1000" y="97" font-family="'Inter', sans-serif" font-size="20" fill="#4A4A60" text-anchor="end">2 / 6</text>

  <text x="80" y="240" font-family="'Bricolage Grotesque', sans-serif" font-size="88" font-weight="800" fill="#F2F2F6">como funciona</text>
  <text x="80" y="340" font-family="'Bricolage Grotesque', sans-serif" font-size="88" font-weight="800" fill="#3E82F7">a avaliação.</text>
  <line x1="80" y1="386" x2="1000" y2="386" stroke="#1A1A2E" stroke-width="1"/>
  <text x="80" y="432" font-family="'Inter', sans-serif" font-size="28" font-weight="300" fill="#7A7A96">10 minutos. sem custo. valor na hora.</text>

  <rect x="80" y="490" width="920" height="100" rx="12" fill="#0F0F1C"/>
  <rect x="80" y="490" width="4" height="100" rx="2" fill="#3E82F7"/>
  <text x="116" y="532" font-family="'Inter', sans-serif" font-size="16" font-weight="600" fill="#3E82F7" letter-spacing="2">PASSO 1</text>
  <text x="116" y="568" font-family="'Inter', sans-serif" font-size="28" fill="#F2F2F6">você traz o aparelho para a smartbase</text>

  <rect x="80" y="606" width="920" height="100" rx="12" fill="#0F0F1C"/>
  <rect x="80" y="606" width="4" height="100" rx="2" fill="#3E82F7"/>
  <text x="116" y="648" font-family="'Inter', sans-serif" font-size="16" font-weight="600" fill="#3E82F7" letter-spacing="2">PASSO 2</text>
  <text x="116" y="684" font-family="'Inter', sans-serif" font-size="28" fill="#F2F2F6">avaliamos tela, bateria, câmera e carcaça</text>

  <rect x="80" y="722" width="920" height="100" rx="12" fill="#0F0F1C"/>
  <rect x="80" y="722" width="4" height="100" rx="2" fill="#6DAFF9"/>
  <text x="116" y="764" font-family="'Inter', sans-serif" font-size="16" font-weight="600" fill="#6DAFF9" letter-spacing="2">PASSO 3</text>
  <text x="116" y="800" font-family="'Inter', sans-serif" font-size="28" fill="#F2F2F6">apresentamos o valor como desconto</text>

  <rect x="80" y="838" width="920" height="100" rx="12" fill="#0F0F1C"/>
  <rect x="80" y="838" width="4" height="100" rx="2" fill="#6DAFF9"/>
  <text x="116" y="880" font-family="'Inter', sans-serif" font-size="16" font-weight="600" fill="#6DAFF9" letter-spacing="2">PASSO 4</text>
  <text x="116" y="916" font-family="'Inter', sans-serif" font-size="28" fill="#F2F2F6">você sai com o produto novo na mão</text>

  <rect x="80" y="984" width="920" height="88" rx="12" fill="#3E82F7"/>
  <text x="540" y="1022" font-family="'Bricolage Grotesque', sans-serif" font-size="30" font-weight="700" fill="#F2F2F6" text-anchor="middle">tempo médio: 10 minutos</text>
  <text x="540" y="1056" font-family="'Inter', sans-serif" font-size="22" fill="rgba(242,242,246,0.75)" text-anchor="middle">sem agendamento. chega e a gente resolve.</text>

  <line x1="80" y1="1258" x2="1000" y2="1258" stroke="#1A1A2E" stroke-width="1"/>
  <rect x="80" y="1276" width="96" height="30" rx="15" fill="#0F0F1C"/>
  <text x="128" y="1297" font-family="'Inter', sans-serif" font-size="13" fill="#3E82F7" text-anchor="middle" font-weight="600">sb</text>
  <text x="194" y="1297" font-family="'Bricolage Grotesque', sans-serif" font-size="28" fill="#F2F2F6"><tspan font-weight="300">smart</tspan><tspan font-weight="700">base</tspan></text>
  <text x="1000" y="1297" font-family="'Inter', sans-serif" font-size="22" fill="#4A4A60" text-anchor="end">@smartbase.cxs</text>
</svg>
