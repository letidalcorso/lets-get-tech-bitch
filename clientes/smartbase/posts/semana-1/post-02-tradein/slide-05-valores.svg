<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#07070E"/>
      <stop offset="100%" stop-color="#0F0F1C"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3E82F7"/>
      <stop offset="100%" stop-color="#6DAFF9"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1350" fill="url(#bg)"/>
  <rect x="0" y="0" width="1080" height="3" fill="url(#brand)"/>

  <!-- Logo pill -->
  <rect x="72" y="54" width="210" height="40" rx="20" fill="#0F0F1C"/>
  <circle cx="95" cy="74" r="10" fill="#3E82F7"/>
  <text x="168" y="80" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="19" text-anchor="middle" fill="#F2F2F6"><tspan font-weight="300">smart</tspan><tspan font-weight="700">base</tspan></text>
  <text x="1008" y="80" text-anchor="end" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="24" fill="#7A7A96">16.04.2026</text>
  <line x1="72" y1="110" x2="1008" y2="110" stroke="#1A1A2E" stroke-width="1"/>

  <!-- Label -->
  <rect x="72" y="148" width="300" height="46" rx="23" fill="#0F0F1C" stroke="#3E82F7" stroke-width="1.5"/>
  <text x="222" y="178" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="22" font-weight="600"
        fill="#3E82F7" text-anchor="middle">valores de referência</text>

  <!-- Headline -->
  <text x="72" y="290" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="68" font-weight="800" fill="#F2F2F6">quanto vale</text>
  <text x="72" y="368" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="68" font-weight="800" fill="#3E82F7">seu iphone</text>
  <text x="72" y="440" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="38" fill="#7A7A96">em bom estado de conservação</text>

  <rect x="72" y="462" width="280" height="3" rx="2" fill="url(#brand)"/>

  <!-- Value rows -->
  <rect x="72" y="498" width="936" height="78" rx="12" fill="#0F0F1C"/>
  <text x="120" y="546" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="30" font-weight="600" fill="#F2F2F6">iphone 13</text>
  <text x="960" y="546" text-anchor="end" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="30" font-weight="700" fill="#6DAFF9">r$ 900 – 1.400</text>

  <rect x="72" y="588" width="936" height="78" rx="12" fill="#121220"/>
  <text x="120" y="636" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="30" font-weight="600" fill="#F2F2F6">iphone 14</text>
  <text x="960" y="636" text-anchor="end" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="30" font-weight="700" fill="#6DAFF9">r$ 1.400 – 2.000</text>

  <rect x="72" y="678" width="936" height="78" rx="12" fill="#0F0F1C"/>
  <text x="120" y="726" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="30" font-weight="600" fill="#F2F2F6">iphone 15</text>
  <text x="960" y="726" text-anchor="end" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="30" font-weight="700" fill="#3E82F7">r$ 2.000 – 2.800</text>

  <rect x="72" y="768" width="936" height="78" rx="12" fill="#121220"/>
  <text x="120" y="816" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="30" font-weight="600" fill="#F2F2F6">iphone 16</text>
  <text x="960" y="816" text-anchor="end" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="30" font-weight="700" fill="#3E82F7">r$ 2.800 – 3.800</text>

  <rect x="72" y="858" width="936" height="78" rx="12" fill="url(#brand)"/>
  <text x="120" y="906" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="30" font-weight="700" fill="#F2F2F6">iphone 17 pro max</text>
  <text x="960" y="906" text-anchor="end" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="30" font-weight="700" fill="#F2F2F6">r$ 4.000 – 5.500</text>

  <!-- Disclaimer -->
  <text x="540" y="1048" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="24" fill="#4A4A60" text-anchor="middle">* valores variam conforme condição e modelo exato.</text>
  <text x="540" y="1082" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="24" fill="#4A4A60" text-anchor="middle">simulação gratuita na loja ou por dm.</text>

  <!-- CTA highlight -->
  <rect x="72" y="1128" width="936" height="120" rx="16" fill="#0F0F1C" stroke="#3E82F7" stroke-width="1.5"/>
  <text x="540" y="1183" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="30" fill="#F2F2F6" text-anchor="middle">esses valores podem ser usados como</text>
  <text x="540" y="1226" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="30" font-weight="700" fill="#3E82F7" text-anchor="middle">desconto na compra do seu novo iphone</text>

  <!-- Footer -->
  <text x="72" y="1312" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="26" fill="#4A4A60">@smartbase.cxs</text>
  <text x="1008" y="1312" text-anchor="end" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="26" fill="#4A4A60">5 / 6</text>
</svg>
