<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#07070E"/>
      <stop offset="100%" stop-color="#0F0F1C"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3E82F7"/>
      <stop offset="100%" stop-color="#6DAFF9"/>
    </linearGradient>
  </defs>

  <rect width="1080" height="1350" fill="url(#bg)"/>
  <rect x="0" y="0" width="1080" height="3" fill="url(#brand)"/>

  <!-- Logo pill -->
  <rect x="72" y="54" width="210" height="40" rx="20" fill="#0F0F1C"/>
  <circle cx="95" cy="74" r="10" fill="#3E82F7"/>
  <text x="168" y="80" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="19" text-anchor="middle" fill="#F2F2F6"><tspan font-weight="300">smart</tspan><tspan font-weight="700">base</tspan></text>
  <text x="1008" y="80" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="24" fill="#7A7A96" text-anchor="end">14.04.2026</text>
  <line x1="72" y1="110" x2="1008" y2="110" stroke="#1A1A2E" stroke-width="1"/>

  <!-- Decorative dot ring -->
  <circle cx="540" cy="340" r="130" fill="none" stroke="#3E82F7" stroke-width="1" opacity="0.2"/>
  <circle cx="540" cy="340" r="100" fill="none" stroke="#3E82F7" stroke-width="1" opacity="0.12"/>
  <circle cx="540" cy="340" r="70" fill="#3E82F7" opacity="0.07"/>
  <circle cx="540" cy="340" r="18" fill="#3E82F7" opacity="0.6"/>

  <!-- Main wordmark -->
  <text x="540" y="530" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="100" text-anchor="middle" fill="#F2F2F6"><tspan font-weight="200">smart</tspan><tspan font-weight="800">base</tspan></text>

  <rect x="200" y="558" width="680" height="2" fill="url(#brand)" rx="1"/>

  <!-- Tagline -->
  <text x="540" y="630" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="40" font-weight="300" fill="#C0C0D0" text-anchor="middle">sua loja apple em caxias do sul.</text>

  <!-- Dots -->
  <circle cx="476" cy="700" r="4" fill="#3E82F7"/>
  <circle cx="540" cy="700" r="4" fill="#1A1A2E"/>
  <circle cx="604" cy="700" r="4" fill="#3E82F7"/>

  <!-- Product pills -->
  <rect x="72" y="748" width="196" height="58" rx="29" fill="#0F0F1C" stroke="#1A1A2E" stroke-width="1"/>
  <text x="170" y="783" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="27" fill="#F2F2F6" text-anchor="middle">iphone</text>

  <rect x="286" y="748" width="160" height="58" rx="29" fill="#0F0F1C" stroke="#1A1A2E" stroke-width="1"/>
  <text x="366" y="783" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="27" fill="#F2F2F6" text-anchor="middle">mac</text>

  <rect x="464" y="748" width="160" height="58" rx="29" fill="#0F0F1C" stroke="#1A1A2E" stroke-width="1"/>
  <text x="544" y="783" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="27" fill="#F2F2F6" text-anchor="middle">ipad</text>

  <rect x="642" y="748" width="306" height="58" rx="29" fill="#3E82F7"/>
  <text x="795" y="783" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="27" font-weight="600" fill="#F2F2F6" text-anchor="middle">trade-in ✓</text>

  <!-- Description -->
  <text x="540" y="900" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="34" fill="#C0C0D0" text-anchor="middle">somos locais. conhecemos cada produto.</text>
  <text x="540" y="950" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="34" fill="#C0C0D0" text-anchor="middle">atendemos sem enrolação.</text>

  <!-- CTA box -->
  <rect x="72" y="1030" width="936" height="160" rx="16" fill="#0F0F1C" stroke="#1A1A2E" stroke-width="1"/>
  <text x="540" y="1097" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="30" fill="#7A7A96" text-anchor="middle">rua santos dumont · caxias do sul · rs</text>
  <text x="540" y="1152" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="32" font-weight="600" fill="#3E82F7" text-anchor="middle">→ link na bio para falar pelo whatsapp</text>

  <!-- Footer -->
  <line x1="72" y1="1255" x2="1008" y2="1255" stroke="#1A1A2E" stroke-width="1"/>
  <text x="72" y="1312" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="26" fill="#4A4A60">@smartbase.cxs</text>
  <text x="1008" y="1312" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="26" fill="#4A4A60" text-anchor="end">especialistas apple · cxs</text>
</svg>
