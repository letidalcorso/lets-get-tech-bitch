<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,700;12..96,800&amp;family=Inter:wght@300;400;500;600&amp;display=swap');</style>
  </defs>
  <rect width="1080" height="1350" fill="#07070E"/>
  <rect x="0" y="0" width="4" height="1350" fill="#3E82F7"/>

  <!-- Ghost -->
  <text x="-20" y="900" font-family="'Bricolage Grotesque', sans-serif" font-size="520" font-weight="800" fill="#F2F2F6" opacity="0.03">sb</text>

  <!-- Photo placeholder -->
  <rect x="580" y="160" width="460" height="720" rx="4" fill="#0F0F1C" stroke="#1A1A2E" stroke-width="1" stroke-dasharray="8,4"/>
  <text x="810" y="525" font-family="'Inter', sans-serif" font-size="18" fill="#2A2A40" text-anchor="middle">foto do produto</text>

  <!-- Badge -->
  <rect x="80" y="72" width="180" height="40" rx="20" fill="#0F0F1C" stroke="#1A1A2E" stroke-width="1"/>
  <text x="170" y="97" font-family="'Inter', sans-serif" font-size="15" font-weight="500" fill="#7A7A96" text-anchor="middle" letter-spacing="2">INSTAGRAM</text>

  <!-- Headline -->
  <text x="80" y="310" font-family="'Bricolage Grotesque', sans-serif" font-size="96" font-weight="800" fill="#F2F2F6">sua</text>
  <text x="80" y="420" font-family="'Bricolage Grotesque', sans-serif" font-size="96" font-weight="800" fill="#F2F2F6">apple store.</text>
  <text x="80" y="530" font-family="'Bricolage Grotesque', sans-serif" font-size="96" font-weight="800" fill="#3E82F7">particular.</text>

  <line x1="80" y1="578" x2="550" y2="578" stroke="#1A1A2E" stroke-width="1"/>

  <text x="80" y="628" font-family="'Inter', sans-serif" font-size="28" font-weight="300" fill="#C0C0D0">especialistas apple em caxias do sul.</text>
  <text x="80" y="710" font-family="'Inter', sans-serif" font-size="22" fill="#7A7A96">iphone  ·  mac  ·  ipad  ·  trade-in</text>

  <line x1="80" y1="1040" x2="1000" y2="1040" stroke="#1A1A2E" stroke-width="1"/>
  <text x="80" y="1088" font-family="'Inter', sans-serif" font-size="26" fill="#7A7A96">rua santos dumont · caxias do sul · rs</text>
  <text x="80" y="1128" font-family="'Inter', sans-serif" font-size="28" font-weight="500" fill="#3E82F7">link na bio para falar pelo whatsapp →</text>

  <!-- Footer -->
  <line x1="80" y1="1258" x2="1000" y2="1258" stroke="#1A1A2E" stroke-width="1"/>
  <rect x="80" y="1276" width="96" height="30" rx="15" fill="#0F0F1C"/>
  <text x="128" y="1297" font-family="'Inter', sans-serif" font-size="13" fill="#3E82F7" text-anchor="middle" font-weight="600">sb</text>
  <text x="194" y="1297" font-family="'Bricolage Grotesque', sans-serif" font-size="28" fill="#F2F2F6"><tspan font-weight="300">smart</tspan><tspan font-weight="700">base</tspan></text>
  <text x="1000" y="1297" font-family="'Inter', sans-serif" font-size="22" fill="#4A4A60" text-anchor="end">@smartbase.cxs</text>
</svg>
