name: ftemper-planejamento-mensal
description: >
  Squad de planejamento e produção mensal de conteúdo para a FTemper.
  Cobre todo o ciclo: investigação de mercado (Sherlock), estratégia e calendário
  editorial (Fernanda + Lucas), aprovação da pauta, produção de copy e legendas
  (Rafael Copy), briefing visual e prompts (Marina Direção) e criação das artes
  no Figma (Valentina) — com checkpoints de aprovação em pontos críticos.
version: "2.0.0"
created: "2026-03-29"
updated: "2026-04-05"
client: ftemper
mode: alta-performance

briefing:
  path: clientes/ftemper/briefing.md

agents:
  - id: fernanda-estrategia
    path: ./agents/fernanda-estrategia.agent.md
  - id: lucas-calendario
    path: ./agents/lucas-calendario.agent.md
  - id: copywriter
    path: ./agents/copywriter.agent.md
  - id: art-director
    path: ./agents/art-director.agent.md
  - id: valentina-figma
    path: ./agents/valentina-figma.agent.md

skills:
  - figma

pipeline:
  entry: pipeline/pipeline.yaml
  steps:
    - step: pipeline/steps/step-01-contexto-mes.md
      type: checkpoint
    - step: pipeline/steps/step-02-sherlock.md
      type: subagent
    - step: pipeline/steps/step-02-fernanda-estrategia.md
      agent: fernanda-estrategia
      execution: inline
    - step: pipeline/steps/step-03-lucas-calendario.md
      agent: lucas-calendario
      execution: inline
    - step: pipeline/steps/step-05-aprovacao-pauta.md
      type: checkpoint
    - step: pipeline/steps/step-06-copywriter.md
      agent: copywriter
      execution: inline
    - step: pipeline/steps/step-07-art-director.md
      agent: art-director
      execution: inline
    - step: pipeline/steps/step-05-valentina-figma.md
      agent: valentina-figma
      execution: inline
      optional: true
    - step: pipeline/steps/step-04-aprovacao-final.md
      type: checkpoint
