name: corneta-producao-mensal
description: >
  Squad de produção mensal de conteúdo para a Corneta Jogos.
  Gera o plano 360 do mês, calendário editorial, 20 posts para @soucorneta,
  20 posts para @fazoubebe e 15 roteiros de UGC/influenciadores.
  Após aprovação, a Valentina cria os designs no Figma sob demanda.
  Cada post é salvo em arquivo individual dentro de output/.
version: "1.0.0"
created: "2026-03-29"
client: corneta-jogos
mode: alta-performance

briefing:
  path: clientes/corneta-jogos/briefing.md

agents:
  - id: marina-360
    path: ./agents/marina-360.agent.md
  - id: lucas-calendario
    path: ./agents/lucas-calendario.agent.md
  - id: camila-corneta
    path: ./agents/camila-corneta.agent.md
  - id: pedro-fazoubebe
    path: ./agents/pedro-fazoubebe.agent.md
  - id: roberta-roteiros
    path: ./agents/roberta-roteiros.agent.md
  - id: renata-revisao
    path: ./agents/renata-revisao.agent.md
  - id: valentina-figma
    path: ./agents/valentina-figma.agent.md

skills:
  - figma

pipeline:
  entry: pipeline/pipeline.yaml
  steps:
    - step: pipeline/steps/step-01-contexto-mes.md
      type: checkpoint
    - step: pipeline/steps/step-02-marina-360.md
      agent: marina-360
      execution: inline
    - step: pipeline/steps/step-03-lucas-calendario.md
      agent: lucas-calendario
      execution: inline
    - step: pipeline/steps/step-04-aprovar-plano.md
      type: checkpoint
    - step: pipeline/steps/step-05-camila-corneta.md
      agent: camila-corneta
      execution: subagent
    - step: pipeline/steps/step-06-pedro-fazoubebe.md
      agent: pedro-fazoubebe
      execution: subagent
    - step: pipeline/steps/step-07-roberta-roteiros.md
      agent: roberta-roteiros
      execution: subagent
    - step: pipeline/steps/step-08-renata-revisao.md
      agent: renata-revisao
      execution: inline
    - step: pipeline/steps/step-09-aprovacao-final.md
      type: checkpoint
    - step: pipeline/steps/step-10-valentina-figma.md
      agent: valentina-figma
      execution: inline
      optional: true
